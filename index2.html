<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOTS Pixel Art Studio</title>
    <style>
        :root {
            --bg-color: #f4f4f4; /* 背景色をグレーに設定 */
            --card-bg: #ffffff;
            --primary-purple: #6c5ce7;
            --accent-green: #55efc4;
            --text-main: #2d3436;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* キャンバスエリア */
        .canvas-container {
            position: relative;
            width: 90vw;
            height: 90vw;
            max-width: 512px;
            max-height: 512px;
            margin-top: 20px;
            background-color: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        /* 操作パネル */
        .panel {
            width: 90vw;
            max-width: 512px;
            background: var(--card-bg);
            border-radius: 20px;
            margin: 20px 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .section-title { font-size: 14px; font-weight: bold; color: #999; margin-bottom: 10px; }

        /* ズーム */
        .zoom-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        input[type="range"] { flex-grow: 1; }
        .btn-mini { border: none; background: #eee; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        /* ツール */
        .tool-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tool-btn { width: 44px; height: 44px; border: none; border-radius: 8px; background: #f0f0f0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .tool-btn.active { background: var(--primary-purple); color: white; }
        .color-picker { width: 44px; height: 44px; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 0 5px rgba(0,0,0,0.2); }

        /* 保存ボタン */
        .btn-save-color { background: var(--accent-green); border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }

        /* アップロードボタン */
        .btn-upload { background: var(--primary-purple); color: white; border: none; width: 100%; padding: 18px; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4); }

        /* サイドメニュー（お手本・背景・編集） */
        .side-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 80%;
            max-width: 320px;
            height: 100%;
            background: #fff;
            z-index: 100;
            transition: 0.3s;
            padding: 20px;
            overflow-y: auto;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
        }
        .side-menu.open { right: 0; }

        .model-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .model-item { border: 2px solid #eee; border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; }
        .model-item img { width: 100%; image-rendering: pixelated; }

        .edit-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 12px; border: none; background: #f8f9fa; border-radius: 10px; margin-bottom: 8px; cursor: pointer; font-size: 14px; }
        .btn-danger { color: #ff7675; }

        /* SNSバナー */
        .sns-row { display: flex; justify-content: space-around; margin-top: 30px; }
        .sns-icon { width: 40px; text-align: center; cursor: pointer; }
        .sns-icon img { width: 100%; }

        .menu-toggle { position: absolute; top: 20px; right: 20px; width: 44px; height: 44px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 110; }
    </style>
</head>
<body>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <div class="canvas-container">
        <canvas id="bgLayer"></canvas>
        <canvas id="modelLayer" style="opacity: 0.6;"></canvas>
        <canvas id="gridLayer"></canvas>
        <canvas id="paintLayer"></canvas>
    </div>

    <div class="panel">
        <div class="section-title">ズーム</div>
        <div class="zoom-row">
            <input type="range" min="1" max="10" value="1">
            <button class="btn-mini">リセット</button>
        </div>

        <div class="section-title">つかう道具</div>
        <div class="tool-row">
            <input type="color" class="color-picker" id="activeColor" value="#000000">
            <button class="tool-btn active">✏️</button>
            <button class="tool-btn">🧽</button>
            <button class="tool-btn">Utilities</button>
            <button class="tool-btn">🎨</button>
        </div>

        <div class="section-title">カラーパレット</div>
        <button class="btn-save-color">この色を保存</button>

        <div class="section-title">作品名</div>
        <input type="text" id="artName" placeholder="作品の名前を入力" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd; margin-bottom:20px; box-sizing:border-box;">

        <button class="btn-upload">作品をアップロード</button>
    </div>

    <div class="side-menu" id="sideMenu">
        <div class="section-title">お手本をえらぶ</div>
        <div class="model-grid">
            <div class="model-item" onclick="setModel('A')"><img src="kingyoA.png" alt="A"><br>お手本A</div>
            <div class="model-item" onclick="setModel('B')"><img src="kingyoB.png" alt="B"><br>お手本B</div>
            <div class="model-item" onclick="setModel('C')"><img src="kingyoC.png" alt="C"><br>お手本C</div>
            <div class="model-item" onclick="setModel('D')"><img src="kingyoD.png" alt="D"><br>お手本D</div>
        </div>

        <div class="section-title">背景イメージ</div>
        <label><input type="checkbox"> 背景を表示</label>
        <select style="width:100%; padding:10px; margin-top:10px; border-radius:5px;">
            <option>背景 1</option>
            <option>背景 2</option>
            <option>背景 3</option>
            <option>背景 4</option>
            <option>背景 5</option>
        </select>

        <div class="section-title" style="margin-top:20px;">へんしゅう</div>
        <button class="edit-btn">⇄ 左右はんてん</button>
        <button class="edit-btn">⇅ 上下はんてん</button>
        <button class="edit-btn">↻ 90度回転</button>
        <button class="edit-btn btn-danger">🗑️ ぜんぶけす</button>

        <div class="sns-row">
            <div class="sns-icon"><img src="line_icon.png" alt="LINE">公式LINE</div>
            <div class="sns-icon"><img src="insta_icon.png" alt="Insta">Insta</div>
            <div class="sns-icon"><img src="x_icon.png" alt="X">X</div>
        </div>
        
        <button onclick="toggleMenu()" style="width:100%; margin-top:30px; padding:10px; border:none; background:#eee; border-radius:8px;">とじる</button>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('open');
        }

        function setModel(type) {
            console.log("Selected model: " + type);
            // ここにお手本画像をmodelLayerに描画する処理を実装
        }
    </script>
</body>
</html>
