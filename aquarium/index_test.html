<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOTS AQUARIUM</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { 
            --primary-color: #6c5ce7; 
            --bg-color: #bce2e8; 
            --card-bg: #ffffff; 
            --accent-color: #ff7675; 
            --active-btn: #55efc4;
        }
        
        body { 
            font-family: 'Segoe UI', 'Hiragino Sans', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            background-color: var(--bg-color); margin: 0; padding: 10px; 
            overflow-x: hidden; touch-action: manipulation;
        }

        /* --- UI Components --- */
        .header-area { 
            width: 100%; max-width: 500px; display: flex; justify-content: center; align-items: center; 
            padding: 10px 0; margin-bottom: 5px; gap: 8px;
        }
        .header-logo { height: 28px; width: auto; }
        h1 { margin: 0; font-size: 1.2rem; color: #333; font-weight: 900; letter-spacing: 1px; }

        .app-container { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; }

        .canvas-area { 
            position: relative; width: 320px; height: 320px; 
            background: #fff; border: 4px solid var(--card-bg); border-radius: 12px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); overflow: hidden;
            touch-action: none;
        }

        #canvasBackground {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center; z-index: 0; display: none;
        }

        .canvas-wrapper { 
            position: absolute; transform-origin: center center; z-index: 1;
            background-image: linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%), 
                              linear-gradient(45deg, #eee 25%, #fff 25%, #fff 75%, #eee 75%);
            background-size: 20px 20px; background-position: 0 0, 10px 10px;
        }
        .canvas-wrapper.bg-active { background: transparent !important; }
        
        canvas { image-rendering: pixelated; display: block; }

        #gridOverlay {
            position: absolute; top: 0; left: 0; width: 320px; height: 320px;
            pointer-events: none; display: none; z-index: 2;
            background-image: 
                linear-gradient(to right, rgba(0,0,0,0.2) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0,0,0,0.2) 1px, transparent 1px);
            background-size: 10px 10px;
        }

        /* --- Controls --- */
        .bottom-controls { 
            width: 100%; max-width: 500px; background: var(--card-bg); 
            padding: 15px; border-radius: 24px; box-sizing: border-box; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-top: 10px;
        }
        .row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
        .section-label { width: 100%; font-size: 0.7rem; color: #aaa; font-weight: bold; margin-bottom: 4px; text-transform: uppercase; }

        .btn { 
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; border: none; border-radius: 12px; background: #f1f2f6; color: #57606f; 
        }
        .btn.active { background: var(--primary-color); color: white; }
        .btn-round { width: 44px; height: 44px; border-radius: 50%; }

        /* --- Sidebar & Specialty --- */
        .sidebar { 
            position: fixed; top: 0; right: -280px; width: 260px; height: 100%; 
            background: var(--card-bg); z-index: 1000; padding: 50px 15px 20px; 
            box-shadow: -5px 0 20px rgba(0,0,0,0.1); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            overflow-y: auto; display: flex; flex-direction: column; gap: 15px;
        }
        .sidebar.open { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 999; display: none; }
        .overlay.active { display: block; }

        .template-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-template { 
            background: #f8f9fa; border: 2px solid #eee; border-radius: 12px; padding: 10px;
            display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer;
        }
        .template-icon { width: 40px; height: 40px; image-rendering: pixelated; object-fit: contain; }
        .btn-template span { font-size: 0.75rem; font-weight: bold; color: #57606f; }

        /* --- Color & Palette --- */
        #colorPicker { width: 44px; height: 44px; border: none; padding: 0; background: none; cursor: pointer; }
        .palette-container { display: flex; flex-wrap: wrap; gap: 8px; min-height: 40px; }
        .palette-item { position: relative; width: 32px; height: 32px; }
        .palette-color { width: 100%; height: 100%; border-radius: 8px; border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-del-color { position: absolute; -5px; right: -5px; width: 16px; height: 16px; background: var(--accent-color); color: white; border-radius: 50%; border: none; font-size: 10px; }

        /* --- Export & Library --- */
        select, input[type="text"] { 
            height: 40px; border-radius: 10px; border: 2px solid #f1f2f6; 
            padding: 0 10px; font-size: 0.85rem; outline: none; 
        }
        .library-item { 
            display: flex; align-items: center; gap: 10px; background: #f8f9fa; 
            padding: 8px; border-radius: 12px; margin-bottom: 8px;
        }
        .library-thumb { width: 40px; height: 40px; border-radius: 4px; background: white; image-rendering: pixelated; }

        .btn-upload { 
            background: var(--primary-color); color: white; width: 100%; height: 50px; 
            font-weight: 900; font-size: 1rem; border-radius: 15px; border: none; 
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3); cursor: pointer; margin-top: 10px;
        }

        #loadingOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(108, 92, 231, 0.9); z-index: 2000; 
            display: none; flex-direction: column; align-items: center; justify-content: center; color: white; 
        }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid #fff; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header-area">
        <img src="images/DOTS_PROJECT_logo_black.png" alt="DOTS" class="header-logo">
        <h1>AQUARIUM</h1>
    </div>

    <button class="btn-round btn" id="openSidebar" style="position:fixed; right:15px; top:15px; z-index:900; background:white;">
        <span class="material-icons">menu</span>
    </button>

    <div id="loadingOverlay"><div class="spinner"></div><p>送信中...</p></div>

    <div class="app-container">
        <div class="canvas-area" id="canvasArea">
            <div id="canvasBackground"></div>
            <div class="canvas-wrapper" id="canvasWrapper">
                <canvas id="dotCanvas" width="32" height="32" style="width: 320px; height: 320px;"></canvas>
                <div id="gridOverlay"></div>
            </div>
        </div>

        <div class="row">
            <button class="btn btn-round" id="btn-undo"><span class="material-icons">undo</span></button>
            <button class="btn btn-round" id="btn-redo"><span class="material-icons">redo</span></button>
            <button class="btn btn-round" id="btn-move"><span class="material-icons">pan_tool</span></button>
            <div style="width: 20px;"></div>
            <button class="btn btn-round" id="btn-reset-zoom"><span class="material-icons">restart_alt</span></button>
        </div>

        <div class="bottom-controls">
            <div class="section-label">ツール</div>
            <div class="row">
                <input type="color" id="colorPicker" value="#000000">
                <button class="btn active" id="btn-pen"><span class="material-icons">edit</span></button>
                <button class="btn" id="btn-eraser"><span class="material-icons">auto_fix_normal</span></button>
                <button class="btn" id="btn-bucket"><span class="material-icons">format_color_fill</span></button>
                <button class="btn" id="btn-picker"><span class="material-icons">colorize</span></button>
            </div>

            <div class="section-label">パレット</div>
            <div class="row" style="justify-content: flex-start;">
                <button class="btn" id="btn-add-palette" style="font-size:0.7rem; padding:0 10px; background:var(--active-btn);">保存</button>
                <div class="palette-container" id="paletteContainer"></div>
            </div>

            <div class="section-label">作品を一時保存</div>
            <div class="row">
                <input type="text" id="artName" placeholder="なまえ" style="flex:1;">
                <button class="btn" id="btn-save-lib" style="background:var(--active-btn); padding:0 15px;">保存</button>
            </div>
            <div id="libraryList"></div>

            <button class="btn-upload" onclick="uploadImage()">アップロードして応募！</button>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="section-label">お手本をえらぶ</div>
        <div class="template-grid">
            <div class="btn-template" onclick="loadTemplate('images/goldfish_a_frame.png')">
                <img src="images/icon_a.png" class="template-icon"><span>金魚A</span>
            </div>
            <div class="btn-template" onclick="loadTemplate('images/goldfish_b_frame.png')">
                <img src="images/icon_b.png" class="template-icon"><span>金魚B</span>
            </div>
            </div>

        <hr style="width:100%; border:none; border-top:1px solid #eee;">
        
        <div class="section-label">背景</div>
        <label style="display:flex; justify-content:space-between; font-size:0.8rem;">背景を表示 <input type="checkbox" id="bgSwitch"></label>
        <select id="bgSelect" disabled>
            <option value="bg1.jpg">背景 1</option>
            <option value="bg2.jpg">背景 2</option>
        </select>

        <div class="section-label">グリッド</div>
        <label style="display:flex; justify-content:space-between; font-size:0.8rem;">せんを表示 <input type="checkbox" id="gridSwitch"></label>

        <div class="section-label">編集</div>
        <button class="btn" id="btn-flip-h" style="width:100%; font-size:0.8rem; justify-content:flex-start; padding-left:15px; margin-bottom:5px;"><span class="material-icons">flip</span> 左右反転</button>
        <button class="btn" id="btn-clear" style="width:100%; font-size:0.8rem; justify-content:flex-start; padding-left:15px; color:var(--accent-color);"><span class="material-icons">delete</span> ぜんぶ消す</button>
    </div>
    <div class="overlay" id="overlay"></div>

    <script>
        const canvas = document.getElementById('dotCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const wrapper = document.getElementById('canvasWrapper');
        const canvasArea = document.getElementById('canvasArea');
        const colorPicker = document.getElementById('colorPicker');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        
        let scale = 1, offsetX = 0, offsetY = 0;
        let currentMode = 'pen', isDrawing = false;
        let history = [], redoStack = [];
        let colorPalette = [], library = [];

        const GAS_ENDPOINT = "https://script.google.com/macros/s/AKfycbz8SvflN2EgSSFFpcu9zbzASn32_JQU2oCn0ARICrar5gCXpR-KuW-hyO1TvsbOQUB2Kw/exec";

        // --- Core Functions ---
        function saveHistory() {
            history.push(canvas.toDataURL());
            if (history.length > 30) history.shift();
            redoStack = [];
            localStorage.setItem('dots_aqua_last', canvas.toDataURL());
        }

        function undo() {
            if (history.length > 1) {
                redoStack.push(history.pop());
                loadImg(history[history.length - 1]);
            }
        }

        function redo() {
            if (redoStack.length > 0) {
                const data = redoStack.pop();
                history.push(data);
                loadImg(data);
            }
        }

        function loadImg(url) {
            const img = new Image();
            img.src = url;
            img.onload = () => {
                ctx.clearRect(0, 0, 32, 32);
                ctx.drawImage(img, 0, 0);
            };
        }

        // --- Interactions ---
        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: Math.floor((clientX - rect.left) / (rect.width / 32)),
                y: Math.floor((clientY - rect.top) / (rect.height / 32))
            };
        }

        const handleMove = (e) => {
            if (!isDrawing || currentMode === 'move') return;
            const pos = getCanvasPos(e);
            draw(pos.x, pos.y);
        };

        canvasArea.addEventListener('mousedown', (e) => {
            if (currentMode === 'move') { isDrawing = true; return; }
            isDrawing = true;
            const pos = getCanvasPos(e);
            if (currentMode === 'bucket') floodFill(pos.x, pos.y, colorPicker.value);
            else draw(pos.x, pos.y);
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            if (currentMode === 'move') {
                offsetX += e.movementX; offsetY += e.movementY;
                updateTransform();
            } else handleMove(e);
        });

        window.addEventListener('mouseup', () => { if(isDrawing) { isDrawing = false; saveHistory(); } });

        // Touch events
        let lastTouch = null;
        canvasArea.addEventListener('touchstart', (e) => {
            isDrawing = true; lastTouch = e.touches[0];
            const pos = getCanvasPos(e);
            if (currentMode === 'bucket') floodFill(pos.x, pos.y, colorPicker.value);
            else draw(pos.x, pos.y);
        }, {passive: false});

        canvasArea.addEventListener('touchmove', (e) => {
            if (!isDrawing) return;
            if (currentMode === 'move') {
                const touch = e.touches[0];
                offsetX += (touch.clientX - lastTouch.clientX);
                offsetY += (touch.clientY - lastTouch.clientY);
                lastTouch = touch; updateTransform();
            } else handleMove(e);
            e.preventDefault();
        }, {passive: false});

        function draw(x, y) {
            if (x < 0 || x >= 32 || y < 0 || y >= 32) return;
            if (currentMode === 'pen') {
                ctx.fillStyle = colorPicker.value;
                ctx.fillRect(x, y, 1, 1);
            } else if (currentMode === 'eraser') {
                ctx.clearRect(x, y, 1, 1);
            } else if (currentMode === 'picker') {
                const data = ctx.getImageData(x, y, 1, 1).data;
                if (data[3] > 0) {
                    const hex = "#" + [data[0], data[1], data[2]].map(v => v.toString(16).padStart(2, '0')).join('');
                    colorPicker.value = hex;
                }
            }
        }

        function floodFill(x, y, fillHex) {
            const target = ctx.getImageData(x, y, 1, 1).data;
            const targetCol = `${target[0]},${target[1]},${target[2]},${target[3]}`;
            ctx.fillStyle = fillHex;
            const stack = [[x, y]];
            const visited = new Set();
            while(stack.length) {
                const [cx, cy] = stack.pop();
                if(cx<0 || cx>=32 || cy<0 || cy>=32 || visited.has(`${cx},${cy}`)) continue;
                const c = ctx.getImageData(cx, cy, 1, 1).data;
                if(`${c[0]},${c[1]},${c[2]},${c[3]}` === targetCol) {
                    ctx.fillRect(cx, cy, 1, 1);
                    visited.add(`${cx},${cy}`);
                    stack.push([cx+1, cy], [cx-1, cy], [cx, cy+1], [cx, cy-1]);
                }
            }
        }

        // --- Specialty Functions ---
        function loadTemplate(path) {
            if(!confirm("お手本を表示しますか？")) return;
            const img = new Image();
            img.src = path;
            img.onload = () => {
                const tCanvas = document.createElement('canvas');
                tCanvas.width = 32; tCanvas.height = 32;
                const tCtx = tCanvas.getContext('2d');
                tCtx.drawImage(img, 0, 0, 32, 32);
                const data = tCtx.getImageData(0, 0, 32, 32).data;
                for (let i = 0; i < data.length; i += 4) {
                    if (data[i+3] > 0) {
                        const x = (i/4) % 32; const y = Math.floor((i/4) / 32);
                        const current = ctx.getImageData(x, y, 1, 1).data;
                        if(current[3] === 0) { ctx.fillStyle = "#E0E0E0"; ctx.fillRect(x, y, 1, 1); }
                    }
                }
                saveHistory();
                sidebar.classList.remove('open'); overlay.classList.remove('active');
            };
        }

        function updateTransform() { wrapper.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`; }

        // --- Library & Palette ---
        function renderPalette() {
            const container = document.getElementById('paletteContainer');
            container.innerHTML = '';
            colorPalette.forEach((col, i) => {
                const item = document.createElement('div');
                item.className = 'palette-item';
                item.innerHTML = `<div class="palette-color" style="background:${col}" onclick="colorPicker.value='${col}'"></div>
                                  <button class="btn-del-color" onclick="removePalette(${i})">×</button>`;
                container.appendChild(item);
            });
        }
        window.removePalette = (i) => { colorPalette.splice(i, 1); saveLocal(); renderPalette(); };
        document.getElementById('btn-add-palette').onclick = () => {
            const col = colorPicker.value;
            if(!colorPalette.includes(col)) { colorPalette.push(col); saveLocal(); renderPalette(); }
        };

        function renderLibrary() {
            const list = document.getElementById('libraryList');
            list.innerHTML = '';
            library.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'library-item';
                div.innerHTML = `<img src="${item.data}" class="library-thumb" onclick="loadImg('${item.data}')">
                                 <span style="flex:1; font-size:0.75rem;">${item.name}</span>
                                 <button onclick="removeLib(${i})" style="border:none; background:none; color:red;">×</button>`;
                list.appendChild(div);
            });
        }
        window.removeLib = (i) => { library.splice(i, 1); saveLocal(); renderLibrary(); };
        document.getElementById('btn-save-lib').onclick = () => {
            const name = document.getElementById('artName').value || "むだい";
            library.push({ name, data: canvas.toDataURL() });
            saveLocal(); renderLibrary();
        };

        function saveLocal() {
            localStorage.setItem('dots_aqua_palette', JSON.stringify(colorPalette));
            localStorage.setItem('dots_aqua_lib', JSON.stringify(library));
        }

        // --- Upload ---
        async function uploadImage() {
            const name = document.getElementById('artName').value.trim();
            if (!name) { alert("作品名を入力してください！"); return; }
            if (!confirm("作品をアップロードしますか？")) return;

            const loading = document.getElementById('loadingOverlay');
            loading.style.display = 'flex';
            const data = canvas.toDataURL('image/png');

            try {
                await fetch(GAS_ENDPOINT, { 
                    method: 'POST', mode: 'no-cors', 
                    body: JSON.stringify({ image: data, name: name, location: 'Aqua' }) 
                });
                loading.style.display = 'none';
                alert("アップロード完了！");
                window.location.href = `https://docs.google.com/forms/d/e/1FAIpQLSfNwyTLJ_-3FJx5oBbgzULdlWZ8TrVfyH6eHv5V4pXlAhP34Q/viewform?usp=pp_url&entry.46158305=${encodeURIComponent(name)}`;
            } catch (e) {
                loading.style.display = 'none';
                alert("アップロードに失敗しました。");
            }
        }

        // --- Event Listeners Init ---
        document.getElementById('openSidebar').onclick = () => { sidebar.classList.add('open'); overlay.classList.add('active'); };
        overlay.onclick = () => { sidebar.classList.remove('open'); overlay.classList.remove('active'); };
        document.getElementById('btn-undo').onclick = undo;
        document.getElementById('btn-redo').onclick = redo;
        document.getElementById('btn-reset-zoom').onclick = () => { scale = 1; offsetX = 0; offsetY = 0; updateTransform(); };
        document.getElementById('gridSwitch').onchange = (e) => document.getElementById('gridOverlay').style.display = e.target.checked ? 'block' : 'none';
        document.getElementById('bgSwitch').onchange = (e) => {
            document.getElementById('canvasBackground').style.display = e.target.checked ? 'block' : 'none';
            document.getElementById('bgSelect').disabled = !e.target.checked;
            wrapper.classList.toggle('bg-active', e.target.checked);
        };
        document.getElementById('bgSelect').onchange = (e) => document.getElementById('canvasBackground').style.backgroundImage = `url('${e.target.value}')`;
        document.getElementById('btn-flip-h').onclick = () => {
            const t = document.createElement('canvas'); t.width=32; t.height=32; const tc = t.getContext('2d');
            tc.scale(-1, 1); tc.drawImage(canvas, -32, 0); ctx.clearRect(0, 0, 32, 32); ctx.drawImage(t, 0, 0); saveHistory();
        };
        document.getElementById('btn-clear').onclick = () => { if(confirm("ぜんぶ消しますか？")) { ctx.clearRect(0, 0, 32, 32); saveHistory(); } };

        const tools = ['pen', 'eraser', 'bucket', 'picker', 'move'];
        tools.forEach(t => {
            document.getElementById(`btn-${t}`).onclick = () => {
                currentMode = t;
                tools.forEach(tool => document.getElementById(`btn-${tool}`).classList.remove('active'));
                document.getElementById(`btn-${t}`).classList.add('active');
            };
        });

        window.onload = () => {
            const last = localStorage.getItem('dots_aqua_last');
            if(last) loadImg(last);
            const pal = localStorage.getItem('dots_aqua_palette');
            if(pal) { colorPalette = JSON.parse(pal); renderPalette(); }
            const lib = localStorage.getItem('dots_aqua_lib');
            if(lib) { library = JSON.parse(lib); renderLibrary(); }
            saveHistory();
        };
    </script>
</body>
</html>
